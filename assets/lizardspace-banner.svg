<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-label="Cartoon green lizard in a magical galaxy landscape">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05081f"/>
      <stop offset="0.35" stop-color="#15105a"/>
      <stop offset="0.68" stop-color="#4b1e82"/>
      <stop offset="1" stop-color="#071022"/>
    </linearGradient>
    <radialGradient id="horizon" cx="50%" cy="70%" r="70%">
      <stop offset="0" stop-color="#ff7cf5" stop-opacity="0.45"/>
      <stop offset="0.35" stop-color="#6d6dff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#69f5ff"/>
      <stop offset="0.7" stop-color="#2d6eff"/>
      <stop offset="1" stop-color="#162060"/>
    </radialGradient>
    <linearGradient id="lizardBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#95ff72"/>
      <stop offset="0.42" stop-color="#2edb58"/>
      <stop offset="1" stop-color="#087b38"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9ffc0"/>
      <stop offset="1" stop-color="#7ccc75"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

